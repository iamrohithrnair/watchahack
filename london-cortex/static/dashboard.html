<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>London Cortex</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
:root {
    --bg: #f0f4f8;
    --bg2: #ffffff;
    --bg3: #e2e8f0;
    --fg: #1a202c;
    --dim: #718096;
    --accent: #4f46e5;
    --accent2: #06b6d4;
    --accent-glow: rgba(79, 70, 229, 0.15);
    --green: #10b981;
    --amber: #f59e0b;
    --red: #ef4444;
    --border: #e2e8f0;
    --gradient-1: linear-gradient(135deg, #4f46e5, #06b6d4);
    --gradient-2: linear-gradient(135deg, #10b981, #06b6d4);
    --shadow-sm: 0 1px 3px rgba(0,0,0,0.06);
    --shadow-md: 0 4px 12px rgba(0,0,0,0.08);
    --shadow-lg: 0 8px 30px rgba(0,0,0,0.12);
}

*, *::before, *::after {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
}

body {
    font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg);
    color: var(--fg);
    line-height: 1.5;
    overflow: hidden;
    height: 100vh;
}

/* ── Header ───────────────────────────────────────────── */

.header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 20px;
    height: 52px;
    background: var(--bg2);
    border-bottom: 2px solid transparent;
    border-image: var(--gradient-1) 1;
    position: relative;
    z-index: 100;
}

.header-left {
    display: flex;
    align-items: center;
    gap: 16px;
}

.header-title {
    font-size: 16px;
    font-weight: 600;
    letter-spacing: -0.3px;
    color: var(--fg);
    display: flex;
    align-items: center;
    gap: 8px;
}

.header-title svg {
    flex-shrink: 0;
}

.header-stats {
    display: flex;
    gap: 20px;
    font-size: 13px;
    color: var(--dim);
}

.header-stat {
    display: flex;
    align-items: center;
    gap: 5px;
}

.header-stat .value {
    font-weight: 700;
    color: var(--accent);
}

.header-right {
    display: flex;
    align-items: center;
    gap: 14px;
}

.connection-status {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    color: var(--dim);
}

.status-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--green);
    flex-shrink: 0;
    box-shadow: 0 0 6px rgba(16,185,129,0.5);
}

.status-dot.disconnected {
    background: var(--red);
}

.status-dot.connecting {
    background: var(--amber);
    animation: pulse-dot 1.2s ease-in-out infinite;
}

@keyframes pulse-dot {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
}

.thinking-bar {
    height: 3px;
    background: var(--gradient-1);
    position: absolute;
    bottom: 0;
    left: 0;
    width: 0;
    transition: width 0.3s ease;
    opacity: 0;
    box-shadow: 0 0 8px rgba(79,70,229,0.4);
}

.thinking-bar.active {
    opacity: 1;
    animation: thinking-slide 2s ease-in-out infinite;
}

@keyframes thinking-slide {
    0% { width: 0; left: 0; }
    50% { width: 40%; left: 30%; }
    100% { width: 0; left: 100%; }
}

/* ── Main Layout ──────────────────────────────────────── */

.main {
    display: flex;
    height: calc(100vh - 52px);
}

/* ── Left Sidebar ─────────────────────────────────────── */

.sidebar-left {
    width: 260px;
    min-width: 260px;
    background: var(--bg2);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
}

.sidebar-section {
    padding: 14px 16px;
    border-bottom: 1px solid var(--border);
}

.sidebar-section-title {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.6px;
    color: var(--dim);
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 6px;
}

.sidebar-section-title svg {
    width: 14px;
    height: 14px;
    stroke: var(--dim);
}

/* Source cards */

.source-cards {
    display: flex;
    flex-direction: column;
    gap: 6px;
}

.source-card {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px 8px;
    border-radius: 4px;
    font-size: 13px;
    transition: background 0.15s;
}

.source-card:hover {
    background: var(--bg3);
}

.source-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    flex-shrink: 0;
}

.source-dot.healthy { background: var(--green); }
.source-dot.warning { background: var(--amber); }
.source-dot.error   { background: var(--red); }
.source-dot.unknown  { background: var(--dim); }

.source-name {
    flex: 1;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}

.source-time {
    font-size: 11px;
    color: var(--dim);
    white-space: nowrap;
}

/* Channel tabs */

.channels-container {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
}

.channel-tabs {
    display: flex;
    flex-wrap: wrap;
    gap: 2px;
    padding: 10px 16px 0;
}

.channel-tab {
    padding: 5px 10px;
    font-size: 12px;
    border: 1px solid transparent;
    border-radius: 4px;
    background: none;
    color: var(--dim);
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 5px;
    transition: all 0.15s;
    position: relative;
}

.channel-tab:hover {
    color: var(--fg);
    background: var(--bg3);
}

.channel-tab.active {
    color: var(--fg);
    background: var(--bg3);
    border-color: var(--border);
    font-weight: 500;
}

.channel-badge {
    background: var(--accent);
    color: #fff;
    font-size: 10px;
    font-weight: 600;
    min-width: 16px;
    height: 16px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0 4px;
}

.channel-badge.hidden { display: none; }

.channel-messages {
    flex: 1;
    overflow-y: auto;
    padding: 10px 16px;
}

.channel-msg {
    padding: 8px 0;
    border-bottom: 1px solid var(--bg3);
    font-size: 13px;
}

.channel-msg:last-child { border-bottom: none; }

.channel-msg-header {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-bottom: 3px;
}

.channel-msg-agent {
    font-weight: 600;
    font-size: 12px;
    color: var(--accent);
}

.channel-msg-time {
    font-size: 11px;
    color: var(--dim);
}

.channel-msg-body {
    color: var(--fg);
    line-height: 1.45;
    word-break: break-word;
}

/* ── Center Panel ─────────────────────────────────────── */

.center {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    min-width: 0;
}

.view-tabs {
    display: flex;
    align-items: center;
    padding: 0 16px;
    height: 40px;
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    gap: 2px;
}

.view-tab {
    padding: 6px 14px;
    font-size: 13px;
    border: none;
    background: none;
    color: var(--dim);
    cursor: pointer;
    border-radius: 4px;
    display: flex;
    align-items: center;
    gap: 6px;
    transition: all 0.15s;
}

.view-tab:hover {
    color: var(--fg);
    background: var(--bg3);
}

.view-tab.active {
    color: var(--bg2);
    background: var(--accent);
    font-weight: 600;
    box-shadow: var(--shadow-sm);
}

.view-tab svg {
    width: 14px;
    height: 14px;
}

.view-tab-controls {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 8px;
}

.toggle-btn {
    padding: 4px 10px;
    font-size: 12px;
    border: 1px solid var(--border);
    background: var(--bg2);
    color: var(--dim);
    cursor: pointer;
    border-radius: 4px;
    display: flex;
    align-items: center;
    gap: 5px;
    transition: all 0.15s;
}

.toggle-btn:hover {
    color: var(--fg);
    border-color: var(--accent);
}

.toggle-btn.active {
    color: var(--accent);
    border-color: var(--accent);
    background: rgba(45,125,210,0.06);
}

.toggle-btn svg {
    width: 13px;
    height: 13px;
}

/* Log view */

.log-view {
    flex: 1;
    overflow: hidden;
    display: none;
    flex-direction: column;
}

.log-view.active { display: flex; }

.log-controls {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 16px;
    border-bottom: 1px solid var(--border);
    background: var(--bg2);
}

.log-controls button {
    padding: 4px 10px;
    font-size: 12px;
    border: 1px solid var(--border);
    background: var(--bg2);
    color: var(--dim);
    cursor: pointer;
    border-radius: 4px;
    transition: all 0.15s;
}

.log-controls button:hover {
    color: var(--fg);
    border-color: var(--accent);
}

.log-controls button.active {
    color: var(--accent);
    border-color: var(--accent);
}

.log-scroll {
    flex: 1;
    overflow-y: auto;
    padding: 8px 0;
    background: var(--bg);
}

.log-entry {
    display: flex;
    gap: 10px;
    padding: 3px 16px;
    font-size: 12px;
    font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
    line-height: 1.6;
    border-left: 2px solid transparent;
    transition: background 0.1s;
}

.log-entry:hover {
    background: var(--bg2);
}

.log-entry.level-INFO    { border-left-color: var(--green); }
.log-entry.level-WARNING { border-left-color: var(--amber); }
.log-entry.level-ERROR   { border-left-color: var(--red); }
.log-entry.level-DEBUG   { border-left-color: var(--dim); }

.log-ts {
    color: var(--dim);
    white-space: nowrap;
    flex-shrink: 0;
}

.log-level {
    font-weight: 600;
    white-space: nowrap;
    flex-shrink: 0;
    min-width: 56px;
}

.log-entry.level-INFO    .log-level { color: var(--green); }
.log-entry.level-WARNING .log-level { color: var(--amber); }
.log-entry.level-ERROR   .log-level { color: var(--red); }
.log-entry.level-DEBUG   .log-level { color: var(--dim); }

.log-agent {
    color: var(--accent);
    white-space: nowrap;
    flex-shrink: 0;
    min-width: 80px;
}

.log-msg {
    color: var(--fg);
    word-break: break-word;
}

/* Map view */

.map-view {
    flex: 1;
    overflow: hidden;
    display: none;
    position: relative;
}

.map-view.active { display: block; }

#map {
    width: 100%;
    height: 100%;
}

.leaflet-container {
    font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
}

.map-popup {
    font-size: 13px;
    line-height: 1.5;
}

.map-popup strong {
    color: var(--fg);
}

.map-popup .popup-detail {
    color: var(--dim);
    font-size: 12px;
}

.map-legend {
    position: absolute;
    bottom: 20px;
    right: 20px;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 10px 14px;
    z-index: 1000;
    font-size: 12px;
}

.map-legend-title {
    font-weight: 600;
    margin-bottom: 6px;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--dim);
}

.map-legend-item {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-bottom: 3px;
}

.map-legend-circle {
    width: 10px;
    height: 10px;
    border-radius: 50%;
}

/* Camera panel */

.camera-panel {
    position: absolute;
    bottom: 20px;
    left: 20px;
    right: 20px;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 4px;
    z-index: 1000;
    display: none;
    max-height: 240px;
    overflow: hidden;
}

.camera-panel.active { display: block; }

.camera-panel-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 14px;
    border-bottom: 1px solid var(--border);
    font-size: 12px;
    font-weight: 600;
}

.camera-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 8px;
    padding: 10px 14px;
    overflow-y: auto;
    max-height: 200px;
}

.camera-thumb {
    border-radius: 4px;
    border: 1px solid var(--border);
    overflow: hidden;
    cursor: pointer;
    transition: border-color 0.15s;
    position: relative;
}

.camera-thumb:hover {
    border-color: var(--accent);
}

.camera-thumb img {
    width: 100%;
    height: 90px;
    object-fit: cover;
    display: block;
    background: var(--bg3);
}

.camera-thumb-label {
    padding: 4px 6px;
    font-size: 11px;
    color: var(--dim);
    background: var(--bg);
}

/* ── Right Sidebar (Investigation) ────────────────────── */

.sidebar-right {
    width: 320px;
    min-width: 320px;
    background: var(--bg2);
    border-left: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    transition: width 0.2s, min-width 0.2s, opacity 0.2s;
}

.sidebar-right.collapsed {
    width: 0;
    min-width: 0;
    opacity: 0;
    overflow: hidden;
}

.sidebar-right-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
}

.sidebar-right-title {
    font-size: 13px;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 6px;
}

.sidebar-right-title svg {
    width: 15px;
    height: 15px;
    stroke: var(--accent);
}

.collapse-btn {
    width: 24px;
    height: 24px;
    border: 1px solid var(--border);
    background: var(--bg2);
    border-radius: 4px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--dim);
    transition: all 0.15s;
}

.collapse-btn:hover {
    color: var(--fg);
    border-color: var(--accent);
}

.expand-btn {
    position: fixed;
    right: 0;
    top: 60px;
    width: 28px;
    height: 28px;
    border: 1px solid var(--border);
    border-right: none;
    background: var(--bg2);
    border-radius: 4px 0 0 4px;
    cursor: pointer;
    display: none;
    align-items: center;
    justify-content: center;
    color: var(--dim);
    z-index: 200;
    transition: all 0.15s;
}

.expand-btn.visible { display: flex; }

.expand-btn:hover {
    color: var(--fg);
    border-color: var(--accent);
}

/* Investigate input */

.investigate-input-wrap {
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
}

.investigate-input-row {
    display: flex;
    gap: 6px;
}

.investigate-input {
    flex: 1;
    padding: 7px 10px;
    font-size: 13px;
    font-family: inherit;
    border: 1px solid var(--border);
    border-radius: 4px;
    outline: none;
    background: var(--bg);
    color: var(--fg);
    transition: border-color 0.15s;
}

.investigate-input:focus {
    border-color: var(--accent);
}

.investigate-input::placeholder {
    color: var(--dim);
}

.investigate-btn {
    padding: 7px 12px;
    font-size: 13px;
    border: 1px solid var(--accent);
    background: var(--accent);
    color: #fff;
    border-radius: 4px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 4px;
    transition: all 0.15s;
    flex-shrink: 0;
}

.investigate-btn:hover {
    background: #2566b5;
}

.investigate-btn:disabled {
    opacity: 0.5;
    cursor: not-allowed;
}

.investigate-btn svg {
    width: 14px;
    height: 14px;
}

/* Investigate results */

.investigate-results {
    flex: 1;
    overflow-y: auto;
    padding: 12px 16px;
}

.investigate-stream {
    font-size: 13px;
    line-height: 1.6;
    color: var(--fg);
    white-space: pre-wrap;
    word-break: break-word;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 12px;
}

.evidence-cards {
    display: flex;
    flex-direction: column;
    gap: 8px;
}

.evidence-card {
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 10px 12px;
    transition: border-color 0.15s;
}

.evidence-card:hover {
    border-color: var(--accent);
}

.evidence-card-header {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-bottom: 4px;
}

.evidence-category {
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    padding: 1px 6px;
    border-radius: 3px;
    background: var(--bg3);
    color: var(--dim);
}

.evidence-category.anomaly { background: #fde8e8; color: var(--red); }
.evidence-category.observation { background: #e8f4fd; color: var(--accent); }
.evidence-category.discovery { background: #e8faf0; color: var(--green); }

.evidence-title {
    font-size: 13px;
    font-weight: 600;
}

.evidence-body {
    font-size: 12px;
    color: var(--dim);
    line-height: 1.45;
}

/* Empty state */

.empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
    color: var(--dim);
    text-align: center;
    font-size: 13px;
    gap: 8px;
}

.empty-state svg {
    width: 32px;
    height: 32px;
    stroke: var(--border);
    margin-bottom: 4px;
}

/* Scrollbar */

::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb {
    background: var(--border);
    border-radius: 3px;
}
::-webkit-scrollbar-thumb:hover { background: var(--dim); }

/* Image modal */

.image-modal {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.4);
    z-index: 9999;
    display: none;
    align-items: center;
    justify-content: center;
    cursor: pointer;
}

.image-modal.active { display: flex; }

.image-modal img {
    max-width: 90vw;
    max-height: 85vh;
    border-radius: 4px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.15);
    cursor: default;
}

/* Retina overlay circle */

.retina-zone {
    fill: rgba(45, 125, 210, 0.08);
    stroke: var(--accent);
    stroke-width: 1;
    stroke-dasharray: 4 2;
}
/* ── Settings Modal ──────────────────────────────────────── */

.settings-btn:hover { border-color: var(--accent) !important; color: var(--accent) !important; }

.settings-overlay {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.35);
    backdrop-filter: blur(4px); z-index: 1000; align-items: center; justify-content: center;
}
.settings-overlay.open { display: flex; }

.settings-modal {
    background: var(--bg2); border-radius: 16px; width: 480px; max-width: 92vw;
    box-shadow: var(--shadow-lg); border: 1px solid var(--border); overflow: hidden;
    animation: modalIn .2s ease;
}
@keyframes modalIn { from { opacity:0; transform:translateY(-12px) scale(.97); } to { opacity:1; transform:none; } }

.settings-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 20px 24px 16px; border-bottom: 1px solid var(--border);
}
.settings-header h2 { font-size: 17px; font-weight: 700; display:flex; align-items:center; gap:8px; }
.settings-header h2 svg { color: var(--accent); }
.settings-close { background:none; border:none; cursor:pointer; color:var(--dim); padding:4px; border-radius:6px; transition:all .15s; }
.settings-close:hover { background:var(--bg3); color:var(--fg); }

.settings-body { padding: 24px; display: flex; flex-direction: column; gap: 20px; }

.settings-field label {
    display: block; font-size: 12px; font-weight: 600; text-transform: uppercase;
    letter-spacing: .5px; color: var(--dim); margin-bottom: 6px;
}
.settings-field select, .settings-field input {
    width: 100%; padding: 10px 12px; border: 1.5px solid var(--border); border-radius: 8px;
    font-size: 14px; background: var(--bg); color: var(--fg); outline: none; transition: border-color .2s;
}
.settings-field select:focus, .settings-field input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); }
.settings-field input::placeholder { color: #a0aec0; }
.settings-field .hint { font-size: 11px; color: var(--dim); margin-top: 4px; }

.key-status { display: inline-flex; align-items: center; gap: 4px; font-size: 11px; font-weight: 600; margin-top: 4px; }
.key-status.set { color: var(--green); }
.key-status.unset { color: var(--amber); }

.settings-actions { padding: 16px 24px; border-top: 1px solid var(--border); display: flex; justify-content: flex-end; gap: 10px; }
.btn-save {
    background: var(--gradient-1); color: #fff; border: none; padding: 9px 24px; border-radius: 8px;
    font-size: 13px; font-weight: 600; cursor: pointer; transition: opacity .2s;
}
.btn-save:hover { opacity: .9; }
.btn-cancel { background: var(--bg3); color: var(--fg); border: none; padding: 9px 18px; border-radius: 8px; font-size: 13px; cursor: pointer; }
.btn-cancel:hover { background: var(--border); }
</style>
</head>
<body>

<!-- ── Header ─────────────────────────────────────────── -->

<header class="header">
    <div class="header-left">
        <div class="header-title" style="background:var(--gradient-1);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="url(#brain-grad)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <defs><linearGradient id="brain-grad" x1="0" y1="0" x2="24" y2="24"><stop offset="0%" stop-color="#4f46e5"/><stop offset="100%" stop-color="#06b6d4"/></linearGradient></defs>
                <path d="M12 2a7 7 0 0 1 7 7c0 2.38-1.19 4.47-3 5.74V17a2 2 0 0 1-2 2h-4a2 2 0 0 1-2-2v-2.26C6.19 13.47 5 11.38 5 9a7 7 0 0 1 7-7z"/>
                <line x1="9" y1="21" x2="15" y2="21"/><line x1="10" y1="17" x2="10" y2="21"/><line x1="14" y1="17" x2="14" y2="21"/>
                <path d="M9 9h.01M15 9h.01"/>
            </svg>
            <span style="background:var(--gradient-1);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;">London Cortex</span>
        </div>
        <div class="header-stats">
            <div class="header-stat">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                <span>Observations</span>
                <span class="value" id="stat-observations">0</span>
            </div>
            <div class="header-stat">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
                <span>Anomalies</span>
                <span class="value" id="stat-anomalies">0</span>
            </div>
            <div class="header-stat">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/></svg>
                <span>Agents</span>
                <span class="value" id="stat-agents">0</span>
            </div>
        </div>
    </div>
    <div class="header-right">
        <button class="settings-btn" id="settings-btn" title="Settings" style="background:none;border:1px solid var(--border);border-radius:6px;padding:5px 7px;cursor:pointer;display:flex;align-items:center;gap:4px;color:var(--dim);transition:all .2s;">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
            </svg>
        </button>
        <div class="connection-status">
            <div class="status-dot" id="ws-status-dot"></div>
            <span id="ws-status-text">Connecting</span>
        </div>
        <button class="toggle-btn" id="camera-toggle-btn" title="Toggle camera grid">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
            Cameras
        </button>
        <button class="toggle-btn" id="investigate-toggle-btn" title="Toggle investigation panel">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            Investigate
        </button>
    </div>
    <div class="thinking-bar" id="thinking-bar"></div>
</header>

<!-- ── Main Layout ────────────────────────────────────── -->

<div class="main">

    <!-- Left Sidebar -->
    <aside class="sidebar-left">
        <div class="sidebar-section">
            <div class="sidebar-section-title">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
                Data Sources
            </div>
            <div class="source-cards" id="source-cards">
                <!-- Populated by JS -->
            </div>
        </div>
        <div class="channels-container">
            <div class="channel-tabs" id="channel-tabs">
                <button class="channel-tab active" data-channel="discoveries">
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M9.5 2A2.5 2.5 0 0112 4.5V5a2 2 0 01-2 2 2 2 0 00-2 2v1h10.5a2.5 2.5 0 012 1L22 14l-1.5 3a2.5 2.5 0 01-2 1H8"/><path d="M5.5 18a2.5 2.5 0 100 5 2.5 2.5 0 000-5z"/><path d="M15 18a2.5 2.5 0 100 5 2.5 2.5 0 000-5z"/></svg>
                    #discoveries
                    <span class="channel-badge hidden" id="badge-discoveries">0</span>
                </button>
                <button class="channel-tab" data-channel="hypotheses">
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M9 3H5a2 2 0 00-2 2v4m6-6h10a2 2 0 012 2v4M9 3v8m0 0H3m6 0h12M3 9v10a2 2 0 002 2h14a2 2 0 002-2V9"/></svg>
                    #hypotheses
                    <span class="channel-badge hidden" id="badge-hypotheses">0</span>
                </button>
                <button class="channel-tab" data-channel="anomalies">
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
                    #anomalies
                    <span class="channel-badge hidden" id="badge-anomalies">0</span>
                </button>
                <button class="channel-tab" data-channel="requests">
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
                    #requests
                    <span class="channel-badge hidden" id="badge-requests">0</span>
                </button>
                <button class="channel-tab" data-channel="meta">
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>
                    #meta
                    <span class="channel-badge hidden" id="badge-meta">0</span>
                </button>
            </div>
            <div class="channel-messages" id="channel-messages">
                <div class="empty-state">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
                    Select a channel to view messages
                </div>
            </div>
        </div>
    </aside>

    <!-- Center Panel -->
    <div class="center">
        <div class="view-tabs">
            <button class="view-tab active" data-view="log">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
                Log
            </button>
            <button class="view-tab" data-view="map">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="1 6 1 22 8 18 16 22 23 18 23 2 16 6 8 2 1 6"/><line x1="8" y1="2" x2="8" y2="18"/><line x1="16" y1="6" x2="16" y2="22"/></svg>
                Map
            </button>
            <div class="view-tab-controls" id="map-controls" style="display:none;">
                <button class="toggle-btn" id="retina-toggle" title="Toggle retina attention zones">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="3"/></svg>
                    Retina
                </button>
            </div>
        </div>

        <!-- Log View -->
        <div class="log-view active" id="log-view">
            <div class="log-controls">
                <button id="log-pause-btn">Pause</button>
                <button id="log-clear-btn">Clear</button>
                <span style="font-size:12px;color:var(--dim);" id="log-count">0 entries</span>
            </div>
            <div class="log-scroll" id="log-scroll">
                <div class="empty-state" id="log-empty">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
                    Waiting for log stream...
                </div>
            </div>
        </div>

        <!-- Map View -->
        <div class="map-view" id="map-view">
            <div id="map"></div>
            <div class="map-legend">
                <div class="map-legend-title">Anomaly Severity</div>
                <div class="map-legend-item"><div class="map-legend-circle" style="background:#2ecc71"></div> 1 - Low</div>
                <div class="map-legend-item"><div class="map-legend-circle" style="background:#45b7d1"></div> 2 - Notice</div>
                <div class="map-legend-item"><div class="map-legend-circle" style="background:#f39c12"></div> 3 - Medium</div>
                <div class="map-legend-item"><div class="map-legend-circle" style="background:#e67e22"></div> 4 - High</div>
                <div class="map-legend-item"><div class="map-legend-circle" style="background:#e74c3c"></div> 5 - Critical</div>
            </div>
            <div class="camera-panel" id="camera-panel">
                <div class="camera-panel-header">
                    <span>Camera Feeds</span>
                    <button class="collapse-btn" id="camera-close-btn" title="Close camera panel">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                    </button>
                </div>
                <div class="camera-grid" id="camera-grid">
                    <!-- Populated by JS -->
                </div>
            </div>
        </div>
    </div>

    <!-- Right Sidebar -->
    <aside class="sidebar-right" id="sidebar-right">
        <div class="sidebar-right-header">
            <div class="sidebar-right-title">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                Investigation
            </div>
            <button class="collapse-btn" id="right-collapse-btn" title="Collapse panel">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
            </button>
        </div>
        <div class="investigate-input-wrap">
            <div class="investigate-input-row">
                <input type="text" class="investigate-input" id="investigate-input" placeholder="Ask about observations, anomalies..." />
                <button class="investigate-btn" id="investigate-btn">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
                </button>
            </div>
        </div>
        <div class="investigate-results" id="investigate-results">
            <div class="empty-state">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                Ask a question to begin investigation
            </div>
        </div>
    </aside>
</div>

<!-- Expand investigation button (visible when collapsed) -->
<button class="expand-btn" id="right-expand-btn" title="Open investigation panel">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
</button>

<!-- Image modal -->
<div class="image-modal" id="image-modal">
    <img id="image-modal-img" src="" alt="Camera feed" />
</div>

<!-- ── JavaScript ─────────────────────────────────────── -->

<script>
(function() {
    'use strict';

    const API = 'http://localhost:8000';

    /* ── State ──────────────────────────────────────── */

    const state = {
        ws: null,
        wsRetries: 0,
        logs: [],
        logPaused: false,
        logCount: 0,
        stats: { observations: 0, anomalies: 0, agents: 0 },
        channels: {},
        activeChannel: 'discoveries',
        unread: { discoveries: 0, hypotheses: 0, anomalies: 0, requests: 0, meta: 0 },
        activeView: 'log',
        sources: {},
        map: null,
        mapMarkers: [],
        retinaZones: [],
        retinaVisible: false,
        camerasVisible: false,
        investigateActive: false,
        rightCollapsed: false,
        thinkingTimeout: null,
    };

    const CHANNEL_NAMES = ['discoveries', 'hypotheses', 'anomalies', 'requests', 'meta'];

    /* ── DOM refs ───────────────────────────────────── */

    const $ = (sel) => document.querySelector(sel);
    const $$ = (sel) => document.querySelectorAll(sel);

    const dom = {
        wsDot: $('#ws-status-dot'),
        wsText: $('#ws-status-text'),
        statObs: $('#stat-observations'),
        statAnom: $('#stat-anomalies'),
        statAgents: $('#stat-agents'),
        logScroll: $('#log-scroll'),
        logEmpty: $('#log-empty'),
        logPauseBtn: $('#log-pause-btn'),
        logClearBtn: $('#log-clear-btn'),
        logCount: $('#log-count'),
        logView: $('#log-view'),
        mapView: $('#map-view'),
        mapControls: $('#map-controls'),
        sourceCards: $('#source-cards'),
        channelMessages: $('#channel-messages'),
        cameraPanel: $('#camera-panel'),
        cameraGrid: $('#camera-grid'),
        sidebarRight: $('#sidebar-right'),
        investigateInput: $('#investigate-input'),
        investigateBtn: $('#investigate-btn'),
        investigateResults: $('#investigate-results'),
        thinkingBar: $('#thinking-bar'),
        imageModal: $('#image-modal'),
        imageModalImg: $('#image-modal-img'),
    };

    /* ── Severity color ─────────────────────────────── */

    function severityColor(s) {
        const colors = { 1: '#2ecc71', 2: '#45b7d1', 3: '#f39c12', 4: '#e67e22', 5: '#e74c3c' };
        return colors[s] || '#6c757d';
    }

    /* ── Time formatting ────────────────────────────── */

    function formatTime(ts) {
        if (!ts) return '';
        const d = new Date(ts);
        return d.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
    }

    function formatTimeShort(ts) {
        if (!ts) return '';
        const d = new Date(ts);
        return d.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' });
    }

    function timeAgo(ts) {
        if (!ts) return '';
        const diff = Math.floor((Date.now() - new Date(ts).getTime()) / 1000);
        if (diff < 60) return diff + 's ago';
        if (diff < 3600) return Math.floor(diff / 60) + 'm ago';
        return Math.floor(diff / 3600) + 'h ago';
    }

    /* ── Escape HTML ────────────────────────────────── */

    function esc(s) {
        const d = document.createElement('div');
        d.textContent = s || '';
        return d.innerHTML;
    }

    /* ── WebSocket ──────────────────────────────────── */

    function connectWS() {
        dom.wsDot.className = 'status-dot connecting';
        dom.wsText.textContent = 'Connecting';

        try {
            const wsUrl = API.replace(/^http/, 'ws') + '/ws';
            state.ws = new WebSocket(wsUrl);
        } catch (e) {
            dom.wsDot.className = 'status-dot disconnected';
            dom.wsText.textContent = 'Error';
            scheduleReconnect();
            return;
        }

        state.ws.onopen = function() {
            state.wsRetries = 0;
            dom.wsDot.className = 'status-dot';
            dom.wsText.textContent = 'Connected';
        };

        state.ws.onmessage = function(e) {
            try {
                const data = JSON.parse(e.data);
                handleWSMessage(data);
            } catch {
                addLogEntry({
                    timestamp: new Date().toISOString(),
                    level: 'INFO',
                    agent: 'system',
                    message: e.data
                });
            }
        };

        state.ws.onclose = function() {
            dom.wsDot.className = 'status-dot disconnected';
            dom.wsText.textContent = 'Disconnected';
            scheduleReconnect();
        };

        state.ws.onerror = function() {
            dom.wsDot.className = 'status-dot disconnected';
            dom.wsText.textContent = 'Error';
        };
    }

    function scheduleReconnect() {
        const delay = Math.min(1000 * Math.pow(2, state.wsRetries), 30000);
        state.wsRetries++;
        setTimeout(connectWS, delay);
    }

    function handleWSMessage(data) {
        if (data.type === 'log' || data.level) {
            addLogEntry(data);
        } else if (data.type === 'thinking') {
            setThinking(data.active !== false);
        } else if (data.type === 'channel') {
            addChannelMessage(data.channel, data);
        } else {
            addLogEntry({
                timestamp: data.timestamp || new Date().toISOString(),
                level: 'DEBUG',
                agent: data.agent || 'system',
                message: JSON.stringify(data)
            });
        }
    }

    /* ── Log entries ────────────────────────────────── */

    function addLogEntry(entry) {
        if (dom.logEmpty) dom.logEmpty.remove();

        state.logs.push(entry);
        state.logCount++;

        const el = document.createElement('div');
        el.className = 'log-entry level-' + (entry.level || 'INFO');

        el.innerHTML =
            '<span class="log-ts">' + esc(formatTime(entry.timestamp)) + '</span>' +
            '<span class="log-level">' + esc(entry.level || 'INFO') + '</span>' +
            '<span class="log-agent">' + esc(entry.agent || '—') + '</span>' +
            '<span class="log-msg">' + esc(entry.message || '') + '</span>';

        dom.logScroll.appendChild(el);

        // Keep max 2000 entries in DOM
        while (dom.logScroll.children.length > 2000) {
            dom.logScroll.removeChild(dom.logScroll.firstChild);
        }

        dom.logCount.textContent = state.logCount + ' entries';

        if (!state.logPaused) {
            dom.logScroll.scrollTop = dom.logScroll.scrollHeight;
        }
    }

    /* ── Thinking indicator ─────────────────────────── */

    function setThinking(active) {
        if (active) {
            dom.thinkingBar.classList.add('active');
            clearTimeout(state.thinkingTimeout);
            state.thinkingTimeout = setTimeout(function() {
                dom.thinkingBar.classList.remove('active');
            }, 10000);
        } else {
            dom.thinkingBar.classList.remove('active');
            clearTimeout(state.thinkingTimeout);
        }
    }

    /* ── Channel messages ───────────────────────────── */

    function addChannelMessage(channel, msg) {
        if (!channel || !CHANNEL_NAMES.includes(channel)) return;
        if (!state.channels[channel]) state.channels[channel] = [];

        state.channels[channel].push({
            agent: msg.agent || 'unknown',
            timestamp: msg.timestamp || new Date().toISOString(),
            content: msg.content || msg.message || ''
        });

        if (state.activeChannel !== channel) {
            state.unread[channel] = (state.unread[channel] || 0) + 1;
            updateBadge(channel);
        } else {
            renderChannelMessages();
        }
    }

    function updateBadge(channel) {
        const badge = document.getElementById('badge-' + channel);
        if (!badge) return;
        const count = state.unread[channel] || 0;
        if (count > 0) {
            badge.textContent = count > 99 ? '99+' : count;
            badge.classList.remove('hidden');
        } else {
            badge.classList.add('hidden');
        }
    }

    function renderChannelMessages() {
        const msgs = state.channels[state.activeChannel] || [];
        if (msgs.length === 0) {
            dom.channelMessages.innerHTML =
                '<div class="empty-state">' +
                '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>' +
                'No messages in #' + esc(state.activeChannel) +
                '</div>';
            return;
        }

        let html = '';
        const recent = msgs.slice(-100);
        for (let i = 0; i < recent.length; i++) {
            const m = recent[i];
            html +=
                '<div class="channel-msg">' +
                '<div class="channel-msg-header">' +
                '<span class="channel-msg-agent">' + esc(m.agent) + '</span>' +
                '<span class="channel-msg-time">' + esc(formatTime(m.timestamp)) + '</span>' +
                '</div>' +
                '<div class="channel-msg-body">' + esc(m.content) + '</div>' +
                '</div>';
        }
        dom.channelMessages.innerHTML = html;
        dom.channelMessages.scrollTop = dom.channelMessages.scrollHeight;
    }

    /* ── Polling: Stats ─────────────────────────────── */

    async function pollStats() {
        try {
            const res = await fetch(API + '/api/stats');
            if (!res.ok) return;
            const data = await res.json();
            state.stats = data;
            dom.statObs.textContent = data.observations || 0;
            dom.statAnom.textContent = data.anomalies || 0;
            dom.statAgents.textContent = data.active_agents || data.agents || 0;
        } catch {}
    }

    /* ── Polling: Tasks / Sources ────────────────────── */

    async function pollTasks() {
        try {
            const res = await fetch(API + '/api/tasks');
            if (!res.ok) return;
            const data = await res.json();
            renderSources(data);
        } catch {}
    }

    function renderSources(tasks) {
        const tasksArr = Array.isArray(tasks) ? tasks : (tasks.tasks || []);
        let html = '';
        for (let i = 0; i < tasksArr.length; i++) {
            const t = tasksArr[i];
            const status = t.status || 'unknown';
            const cls = status === 'healthy' || status === 'running' || status === 'ok'
                ? 'healthy'
                : status === 'warning' || status === 'degraded'
                    ? 'warning'
                    : status === 'error' || status === 'failed'
                        ? 'error'
                        : 'unknown';
            const name = t.name || t.task || t.id || ('Source ' + (i + 1));
            const ts = t.last_run || t.last_update || t.updated_at || '';
            html +=
                '<div class="source-card">' +
                '<div class="source-dot ' + cls + '"></div>' +
                '<span class="source-name">' + esc(name) + '</span>' +
                '<span class="source-time">' + esc(ts ? timeAgo(ts) : '') + '</span>' +
                '</div>';
        }

        // Also add camera sources
        if (state.cameras && state.cameras.length > 0) {
            for (const cam of state.cameras) {
                const cls = cam.status === 'online' ? 'healthy' : cam.status === 'degraded' ? 'warning' : 'error';
                html +=
                    '<div class="source-card">' +
                    '<div class="source-dot ' + cls + '"></div>' +
                    '<span class="source-name">Camera: ' + esc(cam.name || cam.id || 'unknown') + '</span>' +
                    '<span class="source-time">' + esc(cam.last_update ? timeAgo(cam.last_update) : '') + '</span>' +
                    '</div>';
            }
        }

        if (!html) {
            html = '<div class="source-card"><div class="source-dot unknown"></div><span class="source-name">No sources</span><span class="source-time"></span></div>';
        }
        dom.sourceCards.innerHTML = html;
    }

    /* ── Polling: Channels ──────────────────────────── */

    async function pollChannels() {
        try {
            const res = await fetch(API + '/api/channels');
            if (!res.ok) return;
            const data = await res.json();
            const channels = Array.isArray(data) ? data : (data.channels || []);

            for (const ch of channels) {
                const name = ch.name || ch.channel || '';
                if (!CHANNEL_NAMES.includes(name)) continue;
                if (!state.channels[name]) state.channels[name] = [];

                const msgs = ch.messages || [];
                if (msgs.length > state.channels[name].length) {
                    state.channels[name] = msgs.map(function(m) {
                        return {
                            agent: m.agent || m.from || 'unknown',
                            timestamp: m.timestamp || new Date().toISOString(),
                            content: m.content || m.text || m.message || ''
                        };
                    });
                    if (state.activeChannel === name) {
                        renderChannelMessages();
                    }
                }
            }
        } catch {}
    }

    /* ── Polling: Images / Cameras ──────────────────── */

    async function pollImages() {
        try {
            const res = await fetch(API + '/api/images');
            if (!res.ok) return;
            const data = await res.json();
            const images = Array.isArray(data) ? data : (data.images || []);
            renderCameraGrid(images);
        } catch {}
    }

    async function pollCameras() {
        try {
            const res = await fetch(API + '/api/cameras');
            if (!res.ok) return;
            const data = await res.json();
            state.cameras = Array.isArray(data) ? data : (data.cameras || []);
        } catch {}
    }

    function renderCameraGrid(images) {
        if (!images || images.length === 0) {
            dom.cameraGrid.innerHTML = '<div class="empty-state" style="padding:16px;font-size:12px;">No camera feeds available</div>';
            return;
        }

        let html = '';
        for (const img of images) {
            const src = img.url || img.thumbnail || img.image || (API + '/api/images/' + (img.id || ''));
            const label = img.name || img.camera_id || img.id || 'Camera';
            html +=
                '<div class="camera-thumb" data-src="' + esc(img.full_url || img.url || src) + '">' +
                '<img src="' + esc(src) + '" alt="' + esc(label) + '" loading="lazy" />' +
                '<div class="camera-thumb-label">' + esc(label) + '</div>' +
                '</div>';
        }
        dom.cameraGrid.innerHTML = html;

        dom.cameraGrid.querySelectorAll('.camera-thumb').forEach(function(el) {
            el.addEventListener('click', function() {
                const src = el.getAttribute('data-src');
                dom.imageModalImg.src = src;
                dom.imageModal.classList.add('active');
            });
        });
    }

    /* ── Map ────────────────────────────────────────── */

    function initMap() {
        state.map = L.map('map', {
            center: [51.5074, -0.1278],
            zoom: 11,
            zoomControl: true,
            attributionControl: true
        });

        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OSM</a> &copy; <a href="https://carto.com/">CARTO</a>',
            subdomains: 'abcd',
            maxZoom: 19
        }).addTo(state.map);

        // Delay invalidateSize so the container is ready
        setTimeout(function() { state.map.invalidateSize(); }, 200);
    }

    async function pollMapData() {
        if (!state.map) return;
        try {
            const res = await fetch(API + '/api/map_data');
            if (!res.ok) return;
            const data = await res.json();
            renderMapMarkers(data);
        } catch {}
    }

    function renderMapMarkers(data) {
        // Clear existing markers
        for (const m of state.mapMarkers) {
            state.map.removeLayer(m);
        }
        state.mapMarkers = [];

        const items = Array.isArray(data) ? data : (data.markers || data.features || []);

        for (const item of items) {
            const lat = item.lat || item.latitude || (item.location && item.location.lat);
            const lng = item.lng || item.lon || item.longitude || (item.location && item.location.lng);
            if (lat == null || lng == null) continue;

            const severity = item.severity || 1;
            const color = severityColor(severity);
            const title = item.title || item.name || item.type || 'Marker';

            const marker = L.circleMarker([lat, lng], {
                radius: Math.max(5, Math.min(12, severity * 2 + 3)),
                fillColor: color,
                fillOpacity: 0.7,
                color: color,
                weight: 1,
                opacity: 0.9
            }).addTo(state.map);

            let popupContent = '<div class="map-popup">';
            popupContent += '<strong>' + esc(title) + '</strong>';
            if (item.description) {
                popupContent += '<div class="popup-detail">' + esc(item.description) + '</div>';
            }
            if (item.agent) {
                popupContent += '<div class="popup-detail">Agent: ' + esc(item.agent) + '</div>';
            }
            if (item.severity) {
                popupContent += '<div class="popup-detail">Severity: ' + item.severity + '</div>';
            }
            if (item.timestamp) {
                popupContent += '<div class="popup-detail">' + esc(formatTime(item.timestamp)) + '</div>';
            }
            popupContent += '</div>';

            marker.bindPopup(popupContent);
            state.mapMarkers.push(marker);
        }
    }

    async function pollRetina() {
        if (!state.map || !state.retinaVisible) return;
        try {
            const res = await fetch(API + '/api/retina');
            if (!res.ok) return;
            const data = await res.json();
            renderRetinaZones(data);
        } catch {}
    }

    function renderRetinaZones(data) {
        for (const z of state.retinaZones) {
            state.map.removeLayer(z);
        }
        state.retinaZones = [];

        const zones = Array.isArray(data) ? data : (data.zones || data.attention || []);
        for (const zone of zones) {
            const lat = zone.lat || zone.latitude;
            const lng = zone.lng || zone.lon || zone.longitude;
            const radius = zone.radius || 500;
            if (lat == null || lng == null) continue;

            const circle = L.circle([lat, lng], {
                radius: radius,
                className: 'retina-zone',
                fillColor: 'rgba(45,125,210,0.08)',
                fillOpacity: 0.4,
                color: '#2d7dd2',
                weight: 1,
                dashArray: '4 2',
                opacity: 0.6
            }).addTo(state.map);

            if (zone.label) {
                circle.bindPopup('<div class="map-popup"><strong>' + esc(zone.label) + '</strong></div>');
            }
            state.retinaZones.push(circle);
        }
    }

    /* ── Investigation (SSE) ────────────────────────── */

    function startInvestigation(query) {
        if (state.investigateActive) return;
        state.investigateActive = true;
        setThinking(true);
        dom.investigateBtn.disabled = true;

        dom.investigateResults.innerHTML = '';

        const streamEl = document.createElement('div');
        streamEl.className = 'investigate-stream';
        streamEl.textContent = '';
        dom.investigateResults.appendChild(streamEl);

        let fullText = '';

        const evtSource = new EventSource(
            API + '/api/investigate?q=' + encodeURIComponent(query)
        );

        evtSource.onmessage = function(e) {
            try {
                const data = JSON.parse(e.data);
                if (data.type === 'text' || data.content) {
                    fullText += data.content || data.text || '';
                    streamEl.textContent = fullText;
                    dom.investigateResults.scrollTop = dom.investigateResults.scrollHeight;
                } else if (data.type === 'evidence' || data.evidence) {
                    renderEvidenceCard(data.evidence || data);
                } else if (data.type === 'done' || data.done) {
                    evtSource.close();
                    finishInvestigation();
                } else {
                    fullText += data.text || data.message || JSON.stringify(data);
                    streamEl.textContent = fullText;
                }
            } catch {
                fullText += e.data;
                streamEl.textContent = fullText;
            }
            dom.investigateResults.scrollTop = dom.investigateResults.scrollHeight;
        };

        evtSource.onerror = function() {
            evtSource.close();
            if (!fullText) {
                streamEl.textContent = 'Investigation complete.';
            }
            finishInvestigation();
        };

        state.currentSSE = evtSource;
    }

    function finishInvestigation() {
        state.investigateActive = false;
        setThinking(false);
        dom.investigateBtn.disabled = false;
    }

    function renderEvidenceCard(evidence) {
        let container = dom.investigateResults.querySelector('.evidence-cards');
        if (!container) {
            container = document.createElement('div');
            container.className = 'evidence-cards';
            dom.investigateResults.appendChild(container);
        }

        const category = evidence.category || evidence.type || 'general';
        const catClass = ['anomaly', 'observation', 'discovery'].includes(category) ? category : '';

        const card = document.createElement('div');
        card.className = 'evidence-card';
        card.innerHTML =
            '<div class="evidence-card-header">' +
            '<span class="evidence-category ' + catClass + '">' + esc(category) + '</span>' +
            '<span class="evidence-title">' + esc(evidence.title || evidence.name || '') + '</span>' +
            '</div>' +
            '<div class="evidence-body">' + esc(evidence.description || evidence.content || evidence.body || '') + '</div>';
        container.appendChild(card);
    }

    /* ── View switching ─────────────────────────────── */

    function switchView(view) {
        state.activeView = view;
        $$('.view-tab').forEach(function(t) { t.classList.toggle('active', t.getAttribute('data-view') === view); });
        dom.logView.classList.toggle('active', view === 'log');
        dom.mapView.classList.toggle('active', view === 'map');
        dom.mapControls.style.display = view === 'map' ? 'flex' : 'none';

        if (view === 'map' && state.map) {
            setTimeout(function() { state.map.invalidateSize(); }, 100);
        }
    }

    /* ── Event handlers ─────────────────────────────── */

    function setupEvents() {
        // View tabs
        $$('.view-tab').forEach(function(tab) {
            tab.addEventListener('click', function() {
                switchView(tab.getAttribute('data-view'));
            });
        });

        // Log controls
        dom.logPauseBtn.addEventListener('click', function() {
            state.logPaused = !state.logPaused;
            dom.logPauseBtn.textContent = state.logPaused ? 'Resume' : 'Pause';
            dom.logPauseBtn.classList.toggle('active', state.logPaused);
            if (!state.logPaused) {
                dom.logScroll.scrollTop = dom.logScroll.scrollHeight;
            }
        });

        dom.logClearBtn.addEventListener('click', function() {
            dom.logScroll.innerHTML = '';
            state.logs = [];
            state.logCount = 0;
            dom.logCount.textContent = '0 entries';
        });

        // Channel tabs
        $$('.channel-tab').forEach(function(tab) {
            tab.addEventListener('click', function() {
                const ch = tab.getAttribute('data-channel');
                if (!ch) return;
                $$('.channel-tab').forEach(function(t) { t.classList.remove('active'); });
                tab.classList.add('active');
                state.activeChannel = ch;
                state.unread[ch] = 0;
                updateBadge(ch);
                renderChannelMessages();
            });
        });

        // Camera toggle
        $('#camera-toggle-btn').addEventListener('click', function() {
            state.camerasVisible = !state.camerasVisible;
            dom.cameraPanel.classList.toggle('active', state.camerasVisible);
            this.classList.toggle('active', state.camerasVisible);
        });

        $('#camera-close-btn').addEventListener('click', function() {
            state.camerasVisible = false;
            dom.cameraPanel.classList.remove('active');
            $('#camera-toggle-btn').classList.remove('active');
        });

        // Investigation panel toggle
        $('#investigate-toggle-btn').addEventListener('click', function() {
            state.rightCollapsed = !state.rightCollapsed;
            dom.sidebarRight.classList.toggle('collapsed', state.rightCollapsed);
            $('#right-expand-btn').classList.toggle('visible', state.rightCollapsed);
            this.classList.toggle('active', !state.rightCollapsed);
        });

        $('#right-collapse-btn').addEventListener('click', function() {
            state.rightCollapsed = true;
            dom.sidebarRight.classList.add('collapsed');
            $('#right-expand-btn').classList.add('visible');
            $('#investigate-toggle-btn').classList.remove('active');
        });

        $('#right-expand-btn').addEventListener('click', function() {
            state.rightCollapsed = false;
            dom.sidebarRight.classList.remove('collapsed');
            this.classList.remove('visible');
            $('#investigate-toggle-btn').classList.add('active');
        });

        // Retina toggle
        $('#retina-toggle').addEventListener('click', function() {
            state.retinaVisible = !state.retinaVisible;
            this.classList.toggle('active', state.retinaVisible);
            if (state.retinaVisible) {
                pollRetina();
            } else {
                for (const z of state.retinaZones) { state.map.removeLayer(z); }
                state.retinaZones = [];
            }
        });

        // Investigation input
        dom.investigateBtn.addEventListener('click', function() {
            const q = dom.investigateInput.value.trim();
            if (!q || state.investigateActive) return;
            dom.investigateInput.value = '';
            startInvestigation(q);
        });

        dom.investigateInput.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                const q = dom.investigateInput.value.trim();
                if (!q || state.investigateActive) return;
                dom.investigateInput.value = '';
                startInvestigation(q);
            }
        });

        // Image modal close
        dom.imageModal.addEventListener('click', function(e) {
            if (e.target === dom.imageModal) {
                dom.imageModal.classList.remove('active');
            }
        });

        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                dom.imageModal.classList.remove('active');
            }
        });
    }

    /* ── Polling scheduler ──────────────────────────── */

    function startPolling() {
        // Initial polls
        pollStats();
        pollTasks();
        pollChannels();
        pollImages();
        pollCameras();

        // Set intervals
        setInterval(pollStats, 15000);
        setInterval(pollTasks, 10000);
        setInterval(pollChannels, 15000);
        setInterval(pollImages, 30000);
        setInterval(pollCameras, 30000);

        // Map data polling (only when map view is active)
        setInterval(function() {
            if (state.activeView === 'map') {
                pollMapData();
                if (state.retinaVisible) pollRetina();
            }
        }, 10000);

        // Initial map data
        setTimeout(function() {
            pollMapData();
        }, 1500);
    }

    /* ── Init ───────────────────────────────────────── */

    function init() {
        setupEvents();
        initMap();
        connectWS();
        startPolling();
        renderChannelMessages();

        // Initialize with some placeholder sources
        dom.sourceCards.innerHTML =
            '<div class="source-card"><div class="source-dot unknown"></div><span class="source-name">Connecting...</span><span class="source-time"></span></div>';
    }

    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', init);
    } else {
        init();
    }

})();

// ── Settings Modal ──────────────────────────────────────
(function() {
    const overlay = document.createElement('div');
    overlay.className = 'settings-overlay';
    overlay.id = 'settings-overlay';
    overlay.innerHTML = `
    <div class="settings-modal">
        <div class="settings-header">
            <h2>
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
                </svg>
                Settings
            </h2>
            <button class="settings-close" id="settings-close">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
            </button>
        </div>
        <div class="settings-body">
            <div class="settings-field">
                <label>LLM Provider</label>
                <select id="cfg-provider">
                    <option value="gemini">Google Gemini</option>
                    <option value="glm">Z.ai GLM 5.1</option>
                </select>
            </div>
            <div class="settings-field">
                <label>Gemini API Key</label>
                <input type="password" id="cfg-gemini-key" placeholder="AIza..." autocomplete="off">
                <div class="key-status" id="gemini-key-status"></div>
                <div class="hint">Required for Gemini Flash & Pro models</div>
            </div>
            <div class="settings-field">
                <label>GLM 5.1 API Key</label>
                <input type="password" id="cfg-glm-key" placeholder="your-zhipuai-key" autocomplete="off">
                <div class="key-status" id="glm-key-status"></div>
                <div class="hint">Required for Z.ai GLM 5.1 backend</div>
            </div>
        </div>
        <div class="settings-actions">
            <button class="btn-cancel" id="settings-cancel">Cancel</button>
            <button class="btn-save" id="settings-save">Save Settings</button>
        </div>
    </div>`;
    document.body.appendChild(overlay);

    function _hash(key) {
        let h = 0;
        for (let i = 0; i < key.length; i++) { h = ((h << 5) - h + key.charCodeAt(i)) | 0; }
        return 'set_' + Math.abs(h).toString(36);
    }

    function _save(keys) {
        try { localStorage.setItem('_cortex_keys', JSON.stringify(keys)); } catch(e) {}
    }
    function _load() {
        try { return JSON.parse(localStorage.getItem('_cortex_keys') || '{}'); } catch(e) { return {}; }
    }
    function _updateStatus() {
        const keys = _load();
        const gs = document.getElementById('gemini-key-status');
        const gl = document.getElementById('glm-key-status');
        gs.textContent = keys.gemini ? '● Key saved' : '● No key set';
        gs.className = 'key-status ' + (keys.gemini ? 'set' : 'unset');
        gl.textContent = keys.glm ? '● Key saved' : '● No key set';
        gl.className = 'key-status ' + (keys.glm ? 'set' : 'unset');
    }

    document.getElementById('settings-btn').addEventListener('click', () => {
        const keys = _load();
        document.getElementById('cfg-provider').value = keys.provider || 'gemini';
        document.getElementById('cfg-gemini-key').value = keys.gemini ? '••••••••' : '';
        document.getElementById('cfg-glm-key').value = keys.glm ? '••••••••' : '';
        _updateStatus();
        overlay.classList.add('open');
    });

    function _close() { overlay.classList.remove('open'); }
    document.getElementById('settings-close').addEventListener('click', _close);
    document.getElementById('settings-cancel').addEventListener('click', _close);
    overlay.addEventListener('click', (e) => { if (e.target === overlay) _close(); });

    document.getElementById('settings-save').addEventListener('click', () => {
        const keys = _load();
        keys.provider = document.getElementById('cfg-provider').value;
        const gk = document.getElementById('cfg-gemini-key').value;
        const glk = document.getElementById('cfg-glm-key').value;
        if (gk && gk !== '••••••••') keys.gemini = btoa(gk);
        if (glk && glk !== '••••••••') keys.glm = btoa(glk);
        _save(keys);
        _updateStatus();
        _close();
    });

    _updateStatus();
})();
</script>
